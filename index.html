<!DOCTYPE html>
<html>
<head>
<title>Roster Calculator</title>

<style>
:root {
  --bg: #f0f4ff;
  --card: #ffffff;
  --border: rgba(15, 23, 42, 0.12);
  --text: #0f172a;
  --muted: #64748b;
  --primary: #1e40af;
  --primary-2: #2563eb;
  --danger: #dc2626;
  --success: #16a34a;
}

*{box-sizing:border-box;}

body {
  margin: 0;
  padding: 40px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #edf2ff 0%, #f8fafc 100%);
  color: var(--text);
}

.container {
  max-width: 1024px;
  margin: 0 auto;
  background: var(--card);
  border-radius: 18px;
  padding: 28px 32px;
  box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
}

h2 {
  margin: 0 0 20px;
  font-size: 1.7rem;
  letter-spacing: -0.02em;
}

.toprow {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: flex-end;
  justify-content: space-between;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  width: min(100%, 740px);
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: 600;
}

.field input,
.field select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 0.95rem;
  transition: border 0.2s ease, box-shadow 0.2s ease;
}

.field input:focus,
.field select:focus {
  outline: none;
  border-color: var(--primary-2);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
}

.input-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.input-group .prefix {
  font-size: 0.9rem;
  color: var(--muted);
  padding: 9px 10px;
  border: 1px solid var(--border);
  border-radius: 12px 0 0 12px;
  background: rgba(15, 23, 42, 0.04);
}

.button {
  border: none;
  border-radius: 14px;
  padding: 11px 18px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
}

.button:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 22px rgba(15, 23, 42, 0.14);
}

.button:active {
  transform: translateY(0);
}

.primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  color: white;
}

.secondary {
  background: rgba(15, 23, 42, 0.06);
  color: var(--text);
}

.toggles {
  display: flex;
  gap: 22px;
  margin: 18px 0 12px;
  flex-wrap: wrap;
}

.toggle {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 14px;
  border: 1px solid rgba(15, 23, 42, 0.14);
  background: rgba(15, 23, 42, 0.03);
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
}

.toggle input {
  width: 16px;
  height: 16px;
}

#leavePanel {
  display: none;
  padding: 18px;
  border-radius: 16px;
  border: 1px solid rgba(15, 23, 42, 0.12);
  background: rgba(37, 99, 235, 0.05);
  margin-bottom: 16px;
}

#leavePanel h4 {
  margin: 0 0 12px;
  font-size: 1rem;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin-top: 20px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
}

th {
  background: rgba(37, 99, 235, 0.14);
  color: var(--text);
  font-weight: 700;
  padding: 14px 12px;
  text-align: left;
}

td {
  padding: 12px;
  border-bottom: 1px solid rgba(15, 23, 42, 0.08);
  vertical-align: middle;
}

tbody tr:nth-child(odd) {
  background: rgba(15, 23, 42, 0.025);
}

input[type="time"],
input[type="number"],
select {
  width: 100%;
}

.holiday {
  background: rgba(220, 10, 50, 0.08) !important;
  color: var(--danger);
  font-weight: 700;
}

.leave {
  background: rgba(37, 99, 235, 0.12) !important;
  font-weight: 700;
}

#result {
  margin-top: 18px;
  background: rgba(37, 99, 235, 0.06);
  padding: 16px 18px;
  border-radius: 14px;
  border: 1px solid rgba(37, 99, 235, 0.15);
  color: var(--text);
  font-weight: 600;
}

.license-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #edf2ff 0%, #f8fafc 100%);
}

.license-card {
  background: var(--card);
  border-radius: 18px;
  padding: 28px 32px;
  box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
  max-width: 400px;
  width: 100%;
}

.license-card h2 {
  margin: 0 0 20px;
  font-size: 1.7rem;
  letter-spacing: -0.02em;
}

#licenseMessage {
  margin-top: 12px;
  color: var(--danger);
  font-weight: 600;
}
</style>
</head>

<body>

<div id="licenseScreen" class="license-container">
  <div class="license-card">
    <h2>Roster Calculator License Activation</h2>
    <div class="field">
      <label for="licenseKey">License Key</label>
      <input id="licenseKey" type="text" placeholder="XXXX-XXXX-XXXX">
    </div>
    <button class="button primary" onclick="activateLicense()">Activate</button>
    <div id="licenseMessage"></div>
  </div>
</div>

<div id="app" style="display:none;">
<div class="container">

<h2>Roster Calculator</h2>

<div class="toprow">
  <div class="form-grid">
    <div class="field">
      <label for="year">Year</label>
      <input id="year" value="2026" type="number" min="1900" max="2100">
    </div>
    <div class="field">
      <label for="month">Month</label>
      <input id="month" value="3" type="number" min="1" max="12">
    </div>
    <div class="field">
      <label for="staff">Staff Type</label>
      <select id="staff">
        <option value="normal">Normal Staff</option>
        <option value="drivers">Drivers</option>
        <option value="mall">Mall Staff</option>
      </select>
    </div>
    <div class="field">
      <label for="hourlyRateInput">Hourly Rate</label>
      <div class="input-group">
        <span class="prefix">R</span>
        <input id="hourlyRateInput" type="number" value="30.23" step="1" readonly>
      </div>
    </div>
  </div>

  <button class="button primary" onclick="generateCalendar()">Generate Month</button>
</div>

<div class="toggles">
  <label class="toggle"><input type="checkbox" id="salaryToggle" checked><span>Enable Salary</span></label>
  <label class="toggle"><input type="checkbox" id="leaveToggle"><span>Enable Leave</span></label>
</div>

<div id="leavePanel">
  <h4>Apply Leave</h4>
  <div class="form-grid">
    <div class="field">
      <label for="leaveType">Leave Type</label>
      <select id="leaveType">
        <option value="Annual">Annual</option>
        <option value="Sick">Sick</option>
        <option value="Family">Family</option>
        <option value="Parental">Parental</option>
      </select>
    </div>
    <div class="field">
      <label for="leaveFrom">From Day</label>
      <input type="number" id="leaveFrom" min="1" max="31">
    </div>
    <div class="field">
      <label for="leaveTo">To Day</label>
      <input type="number" id="leaveTo" min="1" max="31">
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button class="button secondary" onclick="closeLeave()">Close</button>
    </div>
  </div>
</div>

<div id="calendar"></div>

<div class="actions">
  <button class="button primary" onclick="calculate()">Calculate</button>
  <div id="result"></div>
</div>

</div>

</div>

<script>

// Updated valid license keys
const licenseKeys = [
  'A7K9Q2M4', 'X3P8T6R1', 'L9D4F7W2', 'B6Z1H8N5', 'C2J7V4Q9',
  'M5T1K8Y3', 'R8W6A2P4', 'D4N9X7L1', 'Q7C3M5H8', 'T2F6Z9K4',
  'V1P8D3R7', 'H6Y2W9J5', 'K3B7N1Q8', 'P4M9C6T2', 'Z8R5L3D1',
  'F7A2X4H9', 'N1Q6K8V3', 'J9T4P7B2', 'W5D8M1C6', 'Y2H7R9F4'
];
const encodedKeys = licenseKeys.map(key => btoa(key));

window.onload = function() {
  // Always require re-entry of license key on refresh
  localStorage.removeItem('roster_license_key');
  showLicense();
};

function showLicense() {
  document.getElementById('licenseScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showApp() {
  document.getElementById('licenseScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function activateLicense() {
  const key = document.getElementById('licenseKey').value.trim();
  const encodedKey = btoa(key);
  if (encodedKeys.includes(encodedKey)) {
    localStorage.setItem('roster_license_key', encodedKey);
    showApp();
    document.getElementById('licenseMessage').innerHTML = '';
  } else {
    document.getElementById('licenseMessage').innerHTML = 'Invalid license key';
  }
}

const LUNCH = 1;
let hourlyRate = 30.23;
let leaveHours = 0;

/* Correct South African public holidays for 2026 */

const holidays2026=[
"2026-01-01",
"2026-03-21",
"2026-04-03",
"2026-04-06",
"2026-04-27",
"2026-05-01",
"2026-06-16",
"2026-08-10", // Observed holiday for Women's Day
"2026-09-24",
"2026-12-16",
"2026-12-25",
"2026-12-26"
];

function formatDateKey(date){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

document.getElementById("leaveToggle").addEventListener("change",function(){
let panel=document.getElementById("leavePanel");
panel.style.display=this.checked?"block":"none";
generateCalendar();
});

document.getElementById("leaveFrom").addEventListener("input",updateLeavePreview);
document.getElementById("leaveTo").addEventListener("input",updateLeavePreview);
document.getElementById("leaveType").addEventListener("change",updateLeavePreview);

function updateLeavePreview(){
if(document.getElementById("leaveToggle").checked){
let from=parseInt(document.getElementById("leaveFrom").value)||null;
let to=parseInt(document.getElementById("leaveTo").value)||null;
generateCalendar(from,to);
}
}

function closeLeave(){
document.getElementById("leavePanel").style.display="none";
}

function generateCalendar(leaveFrom=null, leaveTo=null){

leaveHours=0;

let year=document.getElementById("year").value;
let month=document.getElementById("month").value-1;
let staff=document.getElementById("staff").value;
let leaveType=document.getElementById("leaveType").value;

let isPaidLeave = ["Annual","Sick","Family"].includes(leaveType);

let days=new Date(year,month+1,0).getDate();
let names=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let html="<table>";
html+="<tr><th>Date</th><th>Day</th><th>Start</th><th>End</th><th>Off?</th><th>Overtime</th></tr>";

for(let d=1; d<=days; d++){

let date=new Date(year,month,d);
let day=date.getDay();

let start="09:00", end="21:00";

if(staff=="normal"){
if(day==0||day==1){end="20:30";}
}

if(staff=="drivers"){end="20:00";}

if(staff=="mall"){
if(day==0){end="18:00";}
else{end="19:00";}
}

let dateString=formatDateKey(date);

let holidayClass="";
let label="";

if(holidays2026.includes(dateString)){
holidayClass="class='holiday'";
label=" (Holiday)";
}

let isLeaveDay = leaveFrom !== null && leaveTo !== null && d >= leaveFrom && d <= leaveTo;

if(isLeaveDay){

let hours = calculateHours(start,end);
if(isPaidLeave){leaveHours += hours;}

html+="<tr class='leave'>";
html+="<td>"+d+" (Leave)</td>";
html+="<td>"+names[day]+"</td>";
html+="<td><input type='time' value='"+start+"' disabled></td>";
html+="<td><input type='time' value='"+end+"' disabled></td>";
html+="<td><input type='checkbox' disabled></td>";
html+="<td><input type='number' value='0' disabled></td>";
html+="</tr>";

}else{

html+="<tr "+holidayClass+">";
html+="<td>"+d+label+"</td>";
html+="<td>"+names[day]+"</td>";
html+="<td><input type='time' class='start' value='"+start+"'></td>";
html+="<td><input type='time' class='end' value='"+end+"'></td>";
html+="<td><input type='checkbox' class='offday'></td>";
html+="<td><input type='number' class='overtime' value='0' min='0' step='0.25'></td>";
html+="</tr>";

}

}

html+="</table>";
document.getElementById("calendar").innerHTML=html;

}

function calculate(){

let salaryEnabled=document.getElementById("salaryToggle").checked;

let year=document.getElementById("year").value;
let month=document.getElementById("month").value-1;

let rows=document.querySelectorAll("#calendar table tr");

let normal=0;
let sunday=0;
let holiday=0;
let overtimeTotal=0;

let normalPay=0;
let sundayPay=0;
let holidayPay=0;
let overtimePay=0;
let leavePay=0;

for(let i=1;i<rows.length;i++){

let row=rows[i];
if(row.classList.contains('leave')) continue;

let day=parseInt(row.cells[0].textContent);
let date=new Date(year,month,day);

let off=row.querySelector(".offday").checked;
if(off) continue;

let start=row.querySelector(".start").value;
let end=row.querySelector(".end").value;

let hours=calculateHours(start,end);

let overtime=parseFloat(row.querySelector(".overtime").value)||0;
let workHours=hours-overtime;

let dateString=formatDateKey(date);

if(holidays2026.includes(dateString)){

holiday+=workHours;

if(salaryEnabled){
holidayPay+=workHours*hourlyRate*2;
overtimePay+=overtime*hourlyRate*2;
}

}

else if(date.getDay()==0){

sunday+=workHours;

if(salaryEnabled){
sundayPay+=workHours*hourlyRate*1.5;
overtimePay+=overtime*hourlyRate*2;
}

}

else{

normal+=workHours;

if(salaryEnabled){
normalPay+=workHours*hourlyRate;
overtimePay+=overtime*hourlyRate*1.5;
}

}

overtimeTotal+=overtime;

}

if(salaryEnabled){
leavePay=leaveHours*hourlyRate;
}

let result;

if(salaryEnabled){

let totalPay=normalPay+sundayPay+holidayPay+overtimePay+leavePay;

result="Normal Hours: "+normal+" - Pay: R "+normalPay.toFixed(2)+"<br>"+
"Sundays: "+sunday+" - Pay: R "+sundayPay.toFixed(2)+"<br>"+
"Holidays: "+holiday+" - Pay: R "+holidayPay.toFixed(2)+"<br>"+
"Overtime Hours: "+overtimeTotal+" - Pay: R "+overtimePay.toFixed(2)+"<br>"+
"Leave Hours: "+leaveHours+" - Pay: R "+leavePay.toFixed(2)+"<br>"+
"<br>Total Pay: R "+totalPay.toFixed(2);

}else{

result="Normal Hours: "+normal+"<br>"+
"Sundays: "+sunday+"<br>"+
"Holidays: "+holiday+"<br>"+
"Overtime Hours: "+overtimeTotal+"<br>"+
"Leave Hours: "+leaveHours+"<br>";

}

document.getElementById("result").innerHTML=result;

}

function calculateHours(start,end){

let s=start.split(":");
let e=end.split(":");

let startH=parseInt(s[0])+parseInt(s[1])/60;
let endH=parseInt(e[0])+parseInt(e[1])/60;

let total=endH-startH;

total-=LUNCH;

return Math.max(total,0);

}

</script>

</body>
</html>
